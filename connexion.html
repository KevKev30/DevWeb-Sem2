<!DOCTYPE html>
<html>
    <head>
        
        <title>Connectez-vous</title>
        <link rel="stylesheet" href="style.css" type="text/css">
        <link id="theme-link" rel="stylesheet" href="">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>  
        <fieldset>
            <p>Connectez-vous</p>
            <form>
                <br>
                
                <div class="entete">
                    Identifiez-vous pour accéder à votre espace personnel.
                </div>
                <br>
        
                <div class="caption">
                    <label for="email">Adresse mail </label>  
                </div>
                <div class="zone" id="email">
                    <input type="text" name="email" placeholder="Saisissez votre email" />
                </div>
                <br>
        
                <div class="caption">
                    Mot de passe 
                </div>
                <div class="zone" id="mdp">
                    <input type="password" name="password" class="champ" placeholder="Saisissez votre mot de passe" />
                </div>
        
                <div class="underline"> Mot de passe oublié ?</div>
                <br>
        
                <div class="cliquer">
                    <input type="submit" name="connexion" value="Se Connecter"/>
                </div>
                <br>
        
                <em>Pas encore de compte ? <a href="inscription.html">Inscription</a></em>
                </div>
            </form>
        </fieldset>
    
    <script src="utilisateurs.js"></script>
    </body>
</html>
