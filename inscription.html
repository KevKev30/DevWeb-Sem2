

<!DOCTYPE html>
<html>
    <head>

        <title>Inscrivez-vous</title>
        <script defer src="mode_sombre.js"></script>
        <link rel="stylesheet" href="style1.css" type="text/css">
        <link id="theme-link" rel="stylesheet" href="">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>

    <body>

        <fieldset>
            <p>Inscrivez-vous</p>
            <form>
            <div class="entete">
                Inscrivez-vous pour profiter d'une meilleur experience <br>en tant que membre.
                <br>
                <br>
                <br>
            </div>

            <div class="caption">
                Civilité
            </div>

            <div class="zone">
                <select name="civilite">
                    <option value="Femme">Mme</option>
                    <option value="Homme">M</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <br/>

            <div class="caption">
                Nom
            </div>
            <div class="zone">
                <input type="text" name="nom" />
            </div>
            <br/>

            <div class="caption">
                Prénom
            </div>
            <div class="zone">
                <input type="text" name="prenom" />
            </div>
            <br/>

            <div class="caption">
                Email 
            </div>
            <div class="zone">
                <input type="text" name="email" placeholder="Saisissez votre email" />
            </div>
            <br/>

            <div class="caption_mdp">
                 Mot de passe 
            </div>
            <div class="zone">
                <input type="password" name="password" class="champ" placeholder="Saisissez votre mot de passe" />
            </div>
            <br/>

            <div class="cliquer">
                <input type="submit" name="inscrire" value="Créer mon compte"/>
            </div>
            <br/>

            <em>Vous avez déjà un compte ? <a>Connexion</a></em>

            <div class="charte">
                <br>
                En vous inscrivant, vous acceptez avoir <strong>lu</strong>
                <br>
                et <strong>accepté</strong> les conditions générales
                <br>
                et la charte de confidentialité.
            </div>
        </form>
        </fieldset>

        <div class="image_inscription"></div>
    </body>
</html>
