<!DOCTYPE html>
<html>
    <head>

        <title>Inscrivez-vous</title>
        <link rel="stylesheet" href="style.css" type="text/css">
        <link id="theme-link" rel="stylesheet" href="">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <fieldset>
            <p>Inscrivez-vous</p>
            <form>
                <div class="caption">
                    Civilité
                </div>

                <div class="zone">
                    <select name="civilite">
                        <option value="Femme">Mme</option>
                        <option value="Homme">M</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <br/>

                <div class="caption">
                    Nom
                </div>
                <div class="zone">
                    <input type="text" name="nom" onblur="estVide('nom');" required/>
                </div>
                <br/>

                <div class="caption">
                    Prénom
                </div>
                <div class="zone">
                    <input type="text" name="prenom" onblur="estVide('prenom');" required/>
                </div>
                <br/>

                <div class="caption">
                    Numéro étudiant
                </div>
                <div class="zone">
                    <input type="number" name="numero-etudiant" onblur="estVide('numero-etudiant');" required/>
                </div>
                <br/>
                
                <div class="caption">
                    Email
                </div>
                <div class="zone">
                <input type="text" name="email" onblur="verifierEmail();" required/>
                </div>
                <br/>

                <div class="caption">
                    Mot de passe 
                </div>
                <div class="zone">
                    <input type="password" name="password" class="champ" onblur="verifierMdp('password');" required/>
                    <input type="button" value="👁️" onclick="visibilite();"/>
                </div>
                <br/>

                <div class="cliquer">
                    <input type="submit" name="inscrire" value="Créer mon compte"/>
                </div>
                <br/>

                <em>Vous avez déjà un compte ? <a href="connexion.html">Connexion</a></em>
            </form>
        </fieldset>

    <script src="utilisateurs.js"></script>
    </body>
</html>
